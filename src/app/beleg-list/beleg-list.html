<mat-toolbar color="primary">Belege</mat-toolbar>

@if (belege().length === 0) {
<p class="leer">Noch keine Belege — tippe auf „Neuen Beleg erstellen", um deinen ersten Beleg zu scannen.</p>
} @else {
<div class="liste">
@for (beleg of belege(); track beleg._id) {
<mat-card class="beleg-card" [routerLink]="['/beleg', beleg._id]">
  <mat-card-content class="beleg-inhalt">
    <div>
      <div class="beleg-titel">{{ beleg.rechnungssteller }}</div>
      <div class="beleg-datum">{{ beleg.datum | date:'dd.MM.yyyy' }}</div>
    </div>
    <div class="beleg-betrag">{{ beleg.betrag }} €</div>
  </mat-card-content>
</mat-card>
}
</div>
}

<button matButton="filled" class="neuer-beleg" routerLink="/neu">
  Neuen Beleg erstellen
</button>
